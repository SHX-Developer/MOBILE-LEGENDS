<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Nexarena · Mobile MOBA — Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="screens/registration.css" />
<link rel="stylesheet" href="screens/main-menu.css" />
<link rel="stylesheet" href="screens/game-map.css" />
<link rel="stylesheet" href="screens/cyber-menu.css" />
<style>
  html, body { margin: 0; padding: 0; background: #07030f; }
  body { font-family: "Inter", system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/registration.jsx"></script>
<script type="text/babel" src="screens/main-menu.jsx"></script>
<script type="text/babel" src="screens/game-map.jsx"></script>
<script type="text/babel" src="screens/cyber-menu.jsx"></script>

<script type="text/babel">
const App = () => (
  <DesignCanvas
    title="NEXARENA · Telegram Web App MOBA"
    subtitle="Dark purple · Liquid glass · Premium futuristic UI · 1920×1080 landscape"
  >
    <DCSection id="new" title="Главное меню — Cyber Legends · с retention">
      <DCArtboard id="ab-cyber" label="Главное меню · v2 (retention)" width={1920} height={1080}>
        <CyberMenu />
      </DCArtboard>
    </DCSection>
    <DCSection id="screens" title="Earlier exploration">
      <DCArtboard id="ab-reg" label="01 · Регистрация" width={1920} height={1080}>
        <Registration />
      </DCArtboard>
      <DCArtboard id="ab-menu" label="02 · Главное меню (v1)" width={1920} height={1080}>
        <MainMenu />
      </DCArtboard>
      <DCArtboard id="ab-map" label="03 · Карта + HUD" width={1920} height={1080}>
        <GameMap />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

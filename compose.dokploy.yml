name: ml-moba

# Dokploy variant: no Caddy, no port bindings. Dokploy's built-in Traefik
# terminates TLS and routes the public domain to `web` and `server`.
# Configure the Domains tab in the Dokploy Compose service:
#   • Host: <DOMAIN>   Path: /        Service: web     Port: 80
#   • Host: <DOMAIN>   Path: /api     Service: server  Port: 3000
# The server already serves under the /api prefix (NestJS setGlobalPrefix),
# so no strip-prefix middleware is needed.

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  db:
    <<: [*restart, *logging]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in env}
      POSTGRES_DB: ${POSTGRES_DB:-ml_moba}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ml_moba}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  server:
    <<: [*restart, *logging]
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB:-ml_moba}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      CORS_ORIGIN: https://${DOMAIN:-localhost}
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - dokploy-network

  web:
    <<: [*restart, *logging]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - dokploy-network

volumes:
  pgdata:

networks:
  default:
  dokploy-network:
    external: true

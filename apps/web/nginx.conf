server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    charset utf-8;

    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    location = /healthz {
        access_log off;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"ok":true}';
    }

    # Never let Telegram/WebView keep an old HTML shell that points at assets
    # from the previous Docker image.
    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # immutable hashed assets — long cache
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico|webp|map|wasm)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }
}
